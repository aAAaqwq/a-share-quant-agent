name: Weekly Stats Update

on:
  # 每周日 22:00 北京时间 (UTC 14:00) 更新统计
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:

jobs:
  stats:
    name: 📊 周度统计更新
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📊 生成周度报告
        run: |
          mkdir -p reports
          python tracker.py stats --days 60 > reports/weekly-stats.md
          echo "## 累计回测 (全部历史)" >> reports/weekly-stats.md
          python tracker.py stats --days 999 >> reports/weekly-stats.md
        env:
          TZ: Asia/Shanghai

      - name: 📤 提交周报
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/weekly-stats.md || true
          if git diff --staged --quiet; then
            echo "无变更"
          else
            git commit -m "📊 周度统计更新 $(date +%Y-%m-%d)"
            git push
          fi
