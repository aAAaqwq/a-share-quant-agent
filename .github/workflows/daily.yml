name: Daily A-Share Analysis

on:
  # 每日 08:00 北京时间 (UTC 00:00) 跑盘前分析
  schedule:
    - cron: "0 0 * * 1-5"
    # 每日 16:00 北京时间 (UTC 08:00) 跑盘后验证
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式"
        required: true
        type: choice
        options:
          - analyze
          - verify
          - all
        default: all

jobs:
  analyze:
    name: 📊 盘前分析 (08:00 北京)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'analyze' || github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1-5'
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 运行盘前分析
        run: |
          python reporter.py
        env:
          TZ: Asia/Shanghai

      - name: 📤 提交分析报告
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          if git diff --staged --quiet; then
            echo "无变更"
          else
            git commit -m "🤖 自动分析报告 $(date +%Y-%m-%d)"
            git push
          fi

  verify:
    name: ✅ 盘后验证 (16:00 北京)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'verify' || github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1-5'
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 验证所有预测
        run: |
          python backtester.py verify-all
        env:
          TZ: Asia/Shanghai

      - name: 📊 生成胜率报告
        run: |
          python tracker.py stats --days 20 > reports/stats-latest.md
        env:
          TZ: Asia/Shanghai

      - name: 📤 提交验证结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ reports/stats-latest.md || true
          if git diff --staged --quiet; then
            echo "无变更"
          else
            git commit -m "🤖 自动验证结果 $(date +%Y-%m-%d)"
            git push
          fi
